# Prometheus configuration for monitoring the web application

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'webapp-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Rule files for alerts
rule_files:
  # - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Scrape FastAPI metrics
  - job_name: 'fastapi'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+).*'
        replacement: '${1}'

  # Scrape PostgreSQL metrics
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres:9187']
    scrape_interval: 30s

  # Scrape Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
    scrape_interval: 30s

  # Scrape MongoDB metrics
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb:9216']
    scrape_interval: 30s

  # Scrape Nginx metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    scrape_interval: 30s

  # Scrape Node metrics (if running)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # Scrape Celery metrics
  - job_name: 'celery'
    static_configs:
      - targets: ['celery_worker:5555']
    scrape_interval: 30s